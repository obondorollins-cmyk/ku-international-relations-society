<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenyatta University International Relations Society</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;scroll-behavior:smooth;}
body{background:#f4f6f9;color:#1b2a4e;}
img{max-width:100%;border-radius:10px;}
nav{background:#0d2b6b;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;}
nav h2{color:gold;margin-right:20px;}
nav ul{display:flex;gap:30px;list-style:none;}
nav ul li a{color:white;font-weight:500;}

header{text-align:center;padding:60px 20px;background:#1b3f94;color:white;}
header img{width:140px;margin-bottom:20px;}
header h1{font-size:2rem;margin-bottom:10px;}
header p{margin-bottom:20px;}
header .btn{background:gold;color:#0d2b6b;padding:12px 20px;border-radius:10px;font-weight:bold;display:inline-block;}

section{padding:40px 20px;max-width:1000px;margin:auto;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 5px 10px rgba(0,0,0,0.1);}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}

footer{background:#0d2b6b;color:white;text-align:center;padding:30px;}

button{background:#0d2b6b;color:white;padding:10px;border:none;border-radius:5px;margin-top:10px;}
textarea{width:100%;padding:10px;margin-top:10px;}
</style></head>
<body><nav>
<h2>KUIRS</h2>
<ul>
<li><a href="#vision">Vision</a></li>
<li><a href="#gallery">Gallery</a></li>
<li><a href="#posts">Posts</a></li>
</ul>
</nav><header>
<img src="logo.png" alt="logo">
<h1>Kenyatta University International Relations Society</h1>
<p>Mastering the Art of the Deal, Global In Vision</p>
<a href="#posts" class="btn">Join Us</a>
</header><section id="vision">
<h2>Vision</h2>
<div class="card">To build future diplomats and global thinkers.</div>
</section><section id="gallery">
<h2>Gallery</h2>
<div class="grid">
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
</div>
</section><section id="posts">
<h2>Community Posts</h2>
<div class="card">
<textarea id="postInput" placeholder="Write something..."></textarea>
<button onclick="addPost()">Post</button>
</div>
<div id="postList"></div>
</section><footer>
<h3>Join Us. Shape the Future of Diplomacy.</h3>
<p>Email: contact@kuirs.org</p>
</footer><script>
function addPost(){
let input=document.getElementById("postInput");
let postList=document.getElementById("postList");

if(input.value.trim()!=""){
let div=document.createElement("div");
div.className="card";
div.innerText=input.value;
postList.prepend(div);
input.value="";
}
}
</script></body>
</html>
